services:
  postgres:
    image: postgres:16-alpine
    container_name: accesshub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: accesshub
      POSTGRES_PASSWORD: accesshub
      POSTGRES_DB: accesshub
    ports:
      - "5432:5432"
    volumes:
      - accesshub_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accesshub -d accesshub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  accesshub_pg_data:
